<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Details - RuntimeDB</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen flex flex-col font-sans transition-colors duration-300">
    <!-- Navbar -->
    <header class="bg-white dark:bg-gray-800 shadow-md">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center max-w-5xl">
            <a href="/" class="text-2xl font-bold text-indigo-600 dark:text-indigo-400 flex items-center gap-2 hover:opacity-80 transition">
                <i data-lucide="film"></i>
                RuntimeDB
            </a>
            <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition" aria-label="Toggle Dark Mode">
                <i data-lucide="sun" class="hidden dark:block"></i>
                <i data-lucide="moon" class="block dark:hidden"></i>
            </button>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 py-8 max-w-5xl">
        <!-- Back Button -->
        <a href="/" class="inline-flex items-center text-indigo-600 dark:text-indigo-400 hover:underline mb-6 transition">
            <i data-lucide="arrow-left" class="mr-2 h-4 w-4"></i>
            Back to Search
        </a>

        <!-- Loading Indicator -->
        <div id="loading" class="flex justify-center my-12">
            <i data-lucide="loader-2" class="animate-spin text-indigo-500 w-10 h-10"></i>
        </div>

        <!-- Movie Details Section -->
        <div id="movie-details" class="hidden flex-col md:flex-row gap-8 mb-12 bg-white dark:bg-gray-800 rounded-2xl shadow-lg overflow-hidden transition-colors duration-300">
            <!-- Poster -->
            <div class="md:w-1/3 flex-shrink-0">
                <img id="movie-poster" class="w-full h-full object-cover rounded-t-2xl md:rounded-l-2xl md:rounded-tr-none shadow-md" src="" alt="Movie Poster">
            </div>
            <!-- Info -->
            <div class="md:w-2/3 p-8 flex flex-col justify-center">
                <h1 id="movie-title" class="text-4xl font-extrabold mb-2 leading-tight">Loading...</h1>
                <p id="movie-meta" class="text-sm text-gray-500 dark:text-gray-400 mb-6 font-medium flex items-center gap-4">
                    <span id="movie-date"><i data-lucide="calendar" class="inline w-4 h-4 mr-1"></i></span>
                    <span id="official-runtime" class="bg-indigo-100 dark:bg-indigo-900/50 text-indigo-800 dark:text-indigo-300 py-1 px-3 rounded-full"><i data-lucide="clock" class="inline w-4 h-4 mr-1"></i></span>
                </p>
                <p id="movie-overview" class="text-lg leading-relaxed text-gray-700 dark:text-gray-300 mb-6">Loading overview...</p>
            </div>
        </div>

        <!-- Runtimes Section -->
        <div id="runtimes-section" class="hidden">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-bold border-b-2 border-indigo-500 pb-2 inline-block">Available Runtimes</h2>
            </div>

            <ul id="runtimes-list" class="space-y-4 mb-10">
                <!-- List items will be generated here -->
            </ul>

            <!-- Add Version Form -->
            <div class="bg-white dark:bg-gray-800 rounded-xl shadow p-6 border border-gray-200 dark:border-gray-700 transition-colors duration-300">
                <h3 class="text-xl font-semibold mb-6 flex items-center gap-2">
                    <i data-lucide="plus-circle" class="text-indigo-500"></i>
                    Add a New Version
                </h3>

                <div id="form-error" class="hidden bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-400 p-3 rounded-lg mb-4 text-sm font-medium border border-red-200 dark:border-red-800"></div>
                <div id="form-success" class="hidden bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400 p-3 rounded-lg mb-4 text-sm font-medium border border-green-200 dark:border-green-800"></div>

                <form id="add-version-form" class="space-y-5">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <!-- Version Name -->
                        <div>
                            <label for="version_name" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Version Name <span class="text-red-500">*</span></label>
                            <input type="text" id="version_name" name="version_name" required class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white transition" placeholder="e.g. Director's Cut">
                        </div>

                        <!-- Runtime -->
                        <div>
                            <label for="runtime_minutes" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Runtime (minutes) <span class="text-red-500">*</span></label>
                            <input type="number" id="runtime_minutes" name="runtime_minutes" required min="30" max="600" class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white transition" placeholder="e.g. 150">
                        </div>

                        <!-- Release Year -->
                        <div>
                            <label for="release_year" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Release Year (Optional)</label>
                            <input type="number" id="release_year" name="release_year" min="1800" max="2100" class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white transition" placeholder="e.g. 2004">
                        </div>

                        <!-- Notes -->
                        <div class="md:col-span-2">
                            <label for="notes" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Notes (Optional)</label>
                            <textarea id="notes" name="notes" rows="2" class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white transition" placeholder="Any additional information..."></textarea>
                        </div>
                    </div>

                    <button type="submit" class="w-full md:w-auto px-6 py-2 bg-indigo-600 hover:bg-indigo-700 focus:ring-4 focus:ring-indigo-500/50 text-white font-semibold rounded-lg shadow-md transition-all flex items-center justify-center gap-2">
                        <i data-lucide="save" class="w-4 h-4"></i>
                        Save Version
                    </button>
                </form>
            </div>
        </div>
    </main>

    <footer class="bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 mt-auto">
        <div class="container mx-auto px-4 py-6 text-center text-sm text-gray-500 dark:text-gray-400">
            &copy; 2024 RuntimeDB. Data provided by TMDB.
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
