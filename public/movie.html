<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RuntimeDB — Movie</title>
    <link rel="stylesheet" href="tailwind.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-slate-950 text-slate-100 min-h-screen relative overflow-hidden">
    <div class="glow top-0 left-0 w-72 h-72 bg-cyan-500/25"></div>
    <div class="glow bottom-0 right-0 w-96 h-96 bg-indigo-500/30"></div>

    <div class="relative z-10">
      <nav class="max-w-6xl mx-auto px-4 sm:px-6 py-6 flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-2 text-xl font-bold hover:text-cyan-200 transition">
          <span class="inline-flex h-9 w-9 items-center justify-center rounded-xl bg-cyan-400/10 text-cyan-300">RD</span>
          <span>RuntimeDB</span>
        </a>
        <div class="flex items-center gap-3">
          <span id="nav-tagline" class="hidden md:inline text-sm text-slate-300">Official runtimes and alternate cuts</span>
          <button
            id="lang-toggle"
            class="text-sm px-4 py-2 rounded-full border border-white/10 bg-white/5 hover:bg-white/10 transition"
          >
            Français
          </button>
        </div>
      </nav>

      <main class="max-w-6xl mx-auto px-4 sm:px-6 pb-16 space-y-8">
        <section id="movie-details" class="glass rounded-2xl p-6 shadow-xl grid md:grid-cols-[260px_1fr] gap-6">
          <div class="overflow-hidden rounded-xl border border-white/10 bg-slate-900/50">
            <img id="movie-poster" alt="Movie poster" class="w-full h-full object-cover" />
          </div>
          <div class="space-y-3">
            <div class="flex flex-wrap items-center gap-3">
              <h1 id="movie-title" class="text-3xl font-bold">Loading…</h1>
              <span class="px-3 py-1 rounded-full bg-white/5 border border-white/10 text-xs text-slate-300">TMDB</span>
            </div>
            <p id="movie-overview" class="text-slate-300"></p>
            <div class="flex flex-wrap gap-4 text-sm text-slate-300">
              <div class="flex items-center gap-2">
                <span class="text-slate-400" id="movie-release-label">Release date:</span>
                <span id="movie-release"></span>
              </div>
              <div class="flex items-center gap-2">
                <span class="text-slate-400" id="movie-runtime-label">Official runtime:</span>
                <span id="movie-runtime"></span>
              </div>
            </div>
            <div id="movie-error" class="text-rose-300 text-sm"></div>
          </div>
        </section>

        <section class="glass rounded-2xl p-6 shadow-lg space-y-4">
          <div class="flex items-center justify-between flex-wrap gap-3">
            <div>
              <h2 id="available-title" class="text-xl font-semibold">Available runtimes</h2>
              <p id="available-subtitle" class="text-sm text-slate-400">
                Includes theatrical runtime and all alternate versions.
              </p>
            </div>
            <button
              id="refresh-versions"
              class="px-4 py-2 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10 text-sm transition"
            >
              Refresh
            </button>
          </div>
          <ul id="runtimes-list" class="space-y-3"></ul>
        </section>

        <section class="glass rounded-2xl p-6 shadow-lg space-y-5">
          <h2 id="add-version-title" class="text-xl font-semibold">Add a new version</h2>
          <form id="add-version-form" class="grid gap-4 md:grid-cols-2">
            <div class="flex flex-col gap-2">
              <label for="version_name" id="label-version-name" class="text-sm text-slate-300">Version name</label>
              <input
                type="text"
                id="version_name"
                name="version_name"
                maxlength="120"
                required
                class="w-full rounded-xl border border-white/10 bg-slate-900/60 px-3 py-3 text-white placeholder:text-slate-500 focus:border-cyan-400 focus:outline-none focus:ring-2 focus:ring-cyan-500/30"
              />
            </div>
            <div class="flex flex-col gap-2">
              <label for="runtime_minutes" id="label-runtime" class="text-sm text-slate-300">Runtime (minutes)</label>
              <input
                type="number"
                id="runtime_minutes"
                name="runtime_minutes"
                min="30"
                max="600"
                step="1"
                required
                class="w-full rounded-xl border border-white/10 bg-slate-900/60 px-3 py-3 text-white placeholder:text-slate-500 focus:border-cyan-400 focus:outline-none focus:ring-2 focus:ring-cyan-500/30"
              />
            </div>
            <div class="flex flex-col gap-2">
              <label for="release_year" id="label-release" class="text-sm text-slate-300">Release year (optional)</label>
              <input
                type="number"
                id="release_year"
                name="release_year"
                min="1888"
                max="2100"
                step="1"
                class="w-full rounded-xl border border-white/10 bg-slate-900/60 px-3 py-3 text-white placeholder:text-slate-500 focus:border-cyan-400 focus:outline-none focus:ring-2 focus:ring-cyan-500/30"
              />
            </div>
            <div class="flex flex-col gap-2 md:col-span-2">
              <label for="notes" id="label-notes" class="text-sm text-slate-300">Notes (optional)</label>
              <textarea
                id="notes"
                name="notes"
                maxlength="1000"
                rows="3"
                class="w-full rounded-xl border border-white/10 bg-slate-900/60 px-3 py-3 text-white placeholder:text-slate-500 focus:border-cyan-400 focus:outline-none focus:ring-2 focus:ring-cyan-500/30"
              ></textarea>
            </div>
            <div class="flex flex-wrap items-center gap-3 md:col-span-2">
              <button
                type="submit"
                id="save-button"
                class="inline-flex items-center gap-2 rounded-xl bg-gradient-to-r from-cyan-400 to-indigo-500 px-4 py-3 font-semibold text-white shadow-lg shadow-cyan-500/20 hover:from-cyan-300 hover:to-indigo-400 transition"
              >
                Save version
              </button>
              <div id="form-message" class="text-sm text-slate-300"></div>
            </div>
            <div id="form-error" class="text-sm text-rose-300 md:col-span-2"></div>
          </form>
        </section>
      </main>

      <footer class="border-t border-white/5 bg-slate-900/40 py-6">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 text-sm text-slate-400" id="footer-text">
          RuntimeDB — Build your runtime collection
        </div>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
